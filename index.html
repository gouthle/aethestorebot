<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aethestore Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #FF8C00; 
            --bg-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.06);
            --line-color: rgba(255, 255, 255, 0.12);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Анимированный фон */
        .bg-blobs { position: fixed; width: 100%; height: 100%; z-index: -1; filter: blur(80px); opacity: 0.35; pointer-events: none; }
        .blob { position: absolute; background: var(--accent-color); border-radius: 50%; animation: move 18s infinite alternate; }
        .blob-1 { width: 350px; height: 350px; top: -100px; right: -50px; }
        .blob-2 { width: 250px; height: 250px; bottom: -50px; left: -80px; }
        @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 80px) scale(1.1); } }

        .container { 
            width: 100%; max-width: 450px; height: 100vh; 
            margin: 0 auto; padding: 25px; 
            display: flex; flex-direction: column; 
            box-sizing: border-box; z-index: 1;
        }

        /* Прогресс-бар */
        .progress-container { height: 4px; background: var(--line-color); border-radius: 2px; margin-bottom: 30px; }
        .progress-fill { height: 100%; background: var(--accent-color); width: 33%; transition: var(--transition); box-shadow: 0 0 12px var(--accent-color); }

        /* Шапка с выбором языка */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .lang-btn { background: var(--card-bg); border: 1px solid var(--line-color); color: #fff; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; margin-left: 5px; }
        .lang-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

        .typewriter-section h1 { font-family: 'JetBrains Mono', monospace; font-size: 30px; font-weight: 800; color: var(--accent-color); margin: 0; }
        .cursor { display: inline-block; width: 3px; height: 24px; background: var(--accent-color); margin-left: 5px; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Шаги формы */
        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        label { display: block; font-size: 11px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }

        /* Карточки Брендов */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--line-color); 
            padding: 22px 10px; border-radius: 18px; text-align: center; 
            font-weight: 700; transition: 0.3s; cursor: pointer;
        }
        .card.selected { border-color: var(--accent-color); background: rgba(255, 140, 0, 0.15); box-shadow: 0 0 15px rgba(255, 140, 0, 0.1); }

        /* Поля ввода */
        input { 
            width: 100%; background: var(--card-bg); border: 1px solid var(--line-color); 
            padding: 16px; border-radius: 14px; color: #fff; font-size: 16px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.08); }

        /* Теги проблем */
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .tag { background: var(--line-color); padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }

        /* Кнопки навигации */
        .btn-row { margin-top: auto; display: flex; gap: 12px; padding: 20px 0; }
        .nav-btn { 
            flex: 1; padding: 20px; border-radius: 18px; border: none; 
            font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        .primary { background: var(--accent-color); color: #000; }
        .secondary { background: var(--line-color); color: #fff; }

        /* Успех */
        #success-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #success-text { font-family: 'JetBrains Mono', monospace; color: var(--accent-color); text-align: center; margin-top: 20px; padding: 0 30px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="container" id="main-ui">
        <div class="header">
            <div class="typewriter-section">
                <h1><span id="text-node"></span><span class="cursor"></span></h1>
            </div>
            <div class="lang-switcher">
                <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
                <button id="lang-pl" class="lang-btn" onclick="setLanguage('pl')">PL</button>
                <button id="lang-ru" class="lang-btn" onclick="setLanguage('ru')">RU</button>
            </div>
        </div>

        <div class="progress-container"><div class="progress-fill" id="p-fill"></div></div>

        <div class="step active" id="step1">
            <label id="lbl-brand">Device Brand</label>
            <div class="grid">
                <div class="card selected" onclick="selectBrand('iPhone', this)">iPhone</div>
                <div class="card" onclick="selectBrand('Samsung', this)">Samsung</div>
                <div class="card" onclick="selectBrand('Xiaomi', this)">Xiaomi</div>
                <div class="card" onclick="selectBrand('Other', this)">Other</div>
            </div>
        </div>

        <div class="step" id="step2">
            <label id="lbl-model">Model & Details</label>
            <input type="text" id="inp-model" placeholder="e.g. 15 Pro, 256GB">
            
            <label id="lbl-issue">What happened?</label>
            <input type="text" id="inp-issue" placeholder="Describe the problem">
            <div class="tags">
                <div class="tag" onclick="setIssue('Screen 📱')">Screen 📱</div>
                <div class="tag" onclick="setIssue('Battery 🔋')">Battery 🔋</div>
                <div class="tag" onclick="setIssue('Water 💧')">Water 💧</div>
            </div>
        </div>

        <div class="step" id="step3">
            <label id="lbl-phone">Contact Phone</label>
            <input type="tel" id="inp-phone" placeholder="+48 ___ ___ ___">
            
            <label id="lbl-loc">Your Location</label>
            <input type="text" id="inp-loc" placeholder="Address or District">
        </div>

        <div class="btn-row">
            <button class="nav-btn secondary" id="btn-back" onclick="prevStep()" style="display: none;">Back</button>
            <button class="nav-btn primary" id="btn-next" onclick="nextStep()">Next</button>
        </div>
    </div>

    <div id="success-screen">
        <div id="lottie-check" style="width: 200px; height: 200px;"></div>
        <div id="success-text"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentStep = 1;
        let orderData = { brand: 'iPhone', device: '', phone: '', location: '', problem: '' };

        const translations = {
            en: { brand: "Device Brand", model: "Model & Details", model_ph: "e.g. 15 Pro", issue: "What happened?", issue_ph: "Problem", phone: "Phone", loc: "Location", next: "Next", back: "Back", confirm: "Confirm Booking", success: "BOOKING CONFIRMED<br>WE WILL CONTACT YOU" },
            pl: { brand: "Marka urządzenia", model: "Model i szczegóły", model_ph: "np. 15 Pro", issue: "Co się stało?", issue_ph: "Problem", phone: "Telefon", loc: "Lokalizacja", next: "Dalej", back: "Wstecz", confirm: "Zatwierdź", success: "ZAMÓWIENIE POTWIERDZONE<br>ODDEZWIEMY SIĘ" },
            ru: { brand: "Бренд устройства", model: "Модель и детали", model_ph: "напр. 15 Pro", issue: "Что случилось?", issue_ph: "Проблема", phone: "Телефон", loc: "Локация", next: "Далее", back: "Назад", confirm: "Подтвердить", success: "ЗАПИСЬ ПОДТВЕРЖДЕНА<br>МЫ СКОРО СВЯЖЕМСЯ" }
        };

        function runTypewriter() {
            const words = ["aethestore", "service"];
            const node = document.getElementById('text-node');
            let wordIdx = 0, charIdx = 0, isDel = false;
            function type() {
                const word = words[wordIdx];
                node.innerText = word.substring(0, isDel ? charIdx-- : charIdx++);
                let speed = isDel ? 60 : 140;
                if (!isDel && charIdx > word.length) { isDel = true; speed = 2500; }
                else if (isDel && charIdx === 0) { isDel = false; wordIdx = (wordIdx + 1) % words.length; speed = 500; }
                setTimeout(type, speed);
            }
            type();
        }

        function setLanguage(lang) {
            localStorage.setItem('aethe_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            
            const t = translations[lang];
            document.getElementById('lbl-brand').innerText = t.brand;
            document.getElementById('lbl-model').innerText = t.model;
            document.getElementById('inp-model').placeholder = t.model_ph;
            document.getElementById('lbl-issue').innerText = t.issue;
            document.getElementById('inp-issue').placeholder = t.issue_ph;
            document.getElementById('lbl-phone').innerText = t.phone;
            document.getElementById('lbl-loc').innerText = t.loc;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('success-text').innerHTML = t.success;
            updateUI();
        }

        function selectBrand(name, el) {
            orderData.brand = name;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            tg.HapticFeedback.impactOccurred('light');
        }

        function setIssue(text) {
            document.getElementById('inp-issue').value = text;
            tg.HapticFeedback.selectionChanged();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + currentStep).classList.add('active');
            document.getElementById('p-fill').style.width = (currentStep * 33.3) + '%';
            document.getElementById('btn-back').style.display = currentStep === 1 ? 'none' : 'block';
            
            const lang = localStorage.getItem('aethe_lang') || 'en';
            document.getElementById('btn-next').innerText = currentStep === 3 ? translations[lang].confirm : translations[lang].next;
        }

        function nextStep() {
            if (currentStep < 3) {
                currentStep++; updateUI();
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                sendData();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--; updateUI();
            }
        }

        function sendData() {
            orderData.device = document.getElementById('inp-model').value;
            orderData.problem = document.getElementById('inp-issue').value;
            orderData.phone = document.getElementById('inp-phone').value;
            orderData.location = document.getElementById('inp-loc').value;

            if (!orderData.device || !orderData.phone) {
                tg.showAlert("Fill all fields!"); return;
            }

            tg.sendData(JSON.stringify(orderData));
            showSuccess();
        }

        function showSuccess() {
            document.getElementById('main-ui').style.display = 'none';
            const screen = document.getElementById('success-screen');
            screen.style.display = 'flex';
            lottie.loadAnimation({
                container: document.getElementById('lottie-check'),
                path: 'https://lottie.host/9c24095b-3b49-4786-8a7e-128c743e4987/j6IuE9G4W9.json',
                renderer: 'svg', loop: false, autoplay: true
            });
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(() => tg.close(), 3500);
        }

        window.onload = () => {
            runTypewriter();
            setLanguage(localStorage.getItem('aethe_lang') || 'en');
        };
    </script>
</body>
</html>
