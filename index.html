<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #FF8C00; /* Titanium Orange */
            --bg: #000000;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px 25px 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Кнопки переключения языка */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 30px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .lang-btn.active {
            background: var(--accent);
            color: #000;
        }

        .header { margin-bottom: 40px; }
        .header h1 { font-size: 38px; font-weight: 800; margin: 0; color: var(--accent); text-transform: uppercase; letter-spacing: -1.5px; }
        .header p { font-size: 12px; opacity: 0.5; margin: 8px 0 0 0; text-transform: uppercase; letter-spacing: 2px; }

        .form-group { margin-bottom: 32px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
        
        input, select {
            width: 100%; background: transparent; border: none; border-bottom: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 0; padding: 12px 0; color: #fff; font-size: 18px; outline: none; transition: 0.3s;
        }

        input:focus, select:focus { border-bottom-color: var(--accent); }

        .btn {
            margin-top: auto; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 18px;
            padding: 20px; 
            font-size: 17px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 140, 0, 0.2);
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.97); }

        /* Чистый вид селекта */
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <button id="btn-ru" class="lang-btn" onclick="changeLang('ru', this)">RU</button>
            <button id="btn-en" class="lang-btn" onclick="changeLang('en', this)">EN</button>
            <button id="btn-pl" class="lang-btn" onclick="changeLang('pl', this)">PL</button>
        </div>

        <div class="header">
            <h1 id="title">Aethe</h1>
            <p id="subtitle">Premium Service</p>
        </div>

        <div class="form-group">
            <label id="label-brand">Device</label>
            <select id="brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label id="label-model">Model</label>
            <input type="text" id="device" placeholder="...">
        </div>

        <div class="form-group">
            <label id="label-phone">Contact Phone</label>
            <input type="tel" id="phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="form-group">
            <label id="label-issue">Issue Description</label>
            <input type="text" id="problem" placeholder="...">
        </div>

        <button class="btn" id="submit-btn" onclick="sendData()">Confirm Repair</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        const translations = {
            ru: {
                subtitle: "Премиальный сервис",
                brand: "Устройство",
                model: "Модель",
                model_ph: "Напр: 17 Pro, 1ТБ",
                phone: "Контактный телефон",
                issue: "Что случилось?",
                issue_ph: "Опишите проблему",
                submit: "Подтвердить запись"
            },
            en: {
                subtitle: "Premium Service",
                brand: "Device",
                model: "Model",
                model_ph: "e.g. 17 Pro, 1TB",
                phone: "Contact Phone",
                issue: "What happened?",
                issue_ph: "Describe the issue",
                submit: "Confirm Booking"
            },
            pl: {
                subtitle: "Serwis Premium",
                brand: "Urządzenie",
                model: "Model",
                model_ph: "np. 17 Pro, 1TB",
                phone: "Numer telefonu",
                issue: "Co się stało?",
                issue_ph: "Opisz problem",
                submit: "Potwierdź naprawę"
            }
        };

        function changeLang(lang, btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const t = translations[lang];
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('label-brand').innerText = t.brand;
            document.getElementById('label-model').innerText = t.model;
            document.getElementById('device').placeholder = t.model_ph;
            document.getElementById('label-phone').innerText = t.phone;
            document.getElementById('label-issue').innerText = t.issue;
            document.getElementById('problem').placeholder = t.issue_ph;
            document.getElementById('submit-btn').innerText = t.submit;
        }

        // Автоопределение языка при загрузке
        window.onload = function() {
            const userLang = tg.initDataUnsafe.user?.language_code;
            if (userLang === 'pl') {
                changeLang('pl', document.getElementById('btn-pl'));
            } else if (userLang === 'en') {
                changeLang('en', document.getElementById('btn-en'));
            } else {
                changeLang('ru', document.getElementById('btn-ru'));
            }
        };

        function sendData() {
            const data = {
                brand: document.getElementById('brand').value,
                device: document.getElementById('device').value,
                phone: document.getElementById('phone').value,
                problem: document.getElementById('problem').value
            };
            
            if (!data.device || !data.phone) {
                // Вибрация ошибки
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Please fill in the fields!");
                return;
            }

            // Легкая вибрация успеха
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
