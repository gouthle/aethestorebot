<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #FF8C00; /* Titanium Orange */
            --bg: #000000;
            --field-bg: #121212;
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Для Мака */
            padding: 40px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header { margin-bottom: 45px; }
        
        .header h1 {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1.5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .header p {
            font-size: 13px;
            opacity: 0.5;
            margin: 10px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group { margin-bottom: 35px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        input, select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
            padding: 12px 0;
            color: #fff;
            font-size: 18px; /* Крупный текст для телефона */
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            border-bottom-color: var(--accent);
        }

        ::placeholder { color: rgba(255, 255, 255, 0.2); }

        .btn {
            margin-top: auto; /* Кнопка всегда внизу */
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 18px;
            padding: 22px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
        }

        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* Чистим селект */
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Aethe</h1>
            <p>Titanium Service</p>
        </div>

        <div class="form-group">
            <label>Device</label>
            <select id="brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Other">Other Device</option>
            </select>
        </div>

        <div class="form-group">
            <label>Model</label>
            <input type="text" id="device" placeholder="e.g. 17 Pro, 1TB">
        </div>

        <div class="form-group">
            <label>Contact Phone</label>
            <input type="tel" id="phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="form-group">
            <label>What happened?</label>
            <input type="text" id="problem" placeholder="Describe the issue">
        </div>

        <button class="btn" onclick="sendData()">Confirm Repair</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        // Красим верхнюю панель в черный
        tg.setHeaderColor('#000000');

        function sendData() {
            const data = {
                brand: document.getElementById('brand').value,
                device: document.getElementById('device').value,
                phone: document.getElementById('phone').value,
                problem: document.getElementById('problem').value
            };
            
            if (!data.device || !data.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                alert("Please fill in the model and phone!");
                return;
            }

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
