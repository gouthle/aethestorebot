<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 30px;
            text-align: left;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 15px;
            opacity: 0.6;
            margin: 5px 0 0 0;
        }

        .form-item {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 0;
            color: var(--tg-theme-text-color);
            font-size: 17px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-bottom-color: var(--tg-theme-button-color, #007aff);
        }

        .main-button {
            margin-top: 20px;
            background-color: var(--tg-theme-button-color, #000000);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .main-button:active {
            opacity: 0.8;
            transform: scale(0.99);
        }
        
        /* Убираем стандартную стрелочку в select для чистоты */
        select {
            appearance: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Aethe Service</h1>
        <p>Запись на диагностику и ремонт</p>
    </div>

    <div class="form-item">
        <label>Устройство</label>
        <select id="brand">
            <option value="iPhone">iPhone</option>
            <option value="Samsung">Samsung</option>
            <option value="Xiaomi">Xiaomi</option>
            <option value="Другое">Другое устройство</option>
        </select>
    </div>

    <div class="form-item">
        <label>Модель</label>
        <input type="text" id="device" placeholder="Например: 15 Pro, 256GB">
    </div>

    <div class="form-item">
        <label>Контактный номер</label>
        <input type="tel" id="phone" placeholder="+48 ___ ___ ___">
    </div>

    <div class="form-item">
        <label>Описание неисправности</label>
        <input type="text" id="problem" placeholder="Разбито стекло, не заряжается...">
    </div>

    <button class="main-button" onclick="sendData()">Подтвердить запись</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        // Устанавливаем цвет кнопки в приложении
        tg.MainButton.hide(); 

        function sendData() {
            const data = {
                brand: document.getElementById('brand').value,
                device: document.getElementById('device').value,
                phone: document.getElementById('phone').value,
                problem: document.getElementById('problem').value
            };
            
            if (!data.device || !data.phone) {
                tg.showAlert("Пожалуйста, заполните основные поля");
                return;
            }

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
