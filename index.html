<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aethestore Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #FF8C00; 
            --accent-light: #ffaa45;
            --bg-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.08);
            --line-color: rgba(255, 255, 255, 0.15);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-blobs { position: fixed; width: 100%; height: 100%; z-index: -1; filter: blur(60px); opacity: 0.3; pointer-events: none; }
        .blob { position: absolute; background: var(--accent-color); border-radius: 50%; animation: move 25s infinite linear alternate; }
        .blob-1 { width: 400px; height: 400px; top: -150px; right: -100px; }
        .blob-2 { width: 300px; height: 300px; bottom: -100px; left: -150px; opacity: 0.5; }
        @keyframes move { 0% { transform: translate(0,0); } 100% { transform: translate(60px, 40px); } }

        .container { 
            width: 100%; max-width: 450px; height: 100vh; 
            margin: 0 auto; padding: 20px 25px; 
            display: flex; flex-direction: column; 
            box-sizing: border-box; z-index: 1;
        }

        .progress-container { height: 6px; background: var(--line-color); border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { 
            height: 100%; background: linear-gradient(90deg, var(--accent-color), var(--accent-light)); 
            width: 33%; transition: var(--transition); 
            box-shadow: 0 0 15px var(--accent-color);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .lang-switcher { display: flex; gap: 6px; }
        .lang-btn { 
            background: var(--card-bg); border: 1px solid var(--line-color); color: #fff; 
            padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 800; 
            cursor: pointer; transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

        .typewriter-section h1 { 
            font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 800; 
            background: linear-gradient(135deg, var(--accent-color), #fff);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin: 0; 
            white-space: nowrap;
        }
        .cursor { display: inline-block; width: 3px; height: 20px; background: var(--accent-color); margin-left: 3px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; font-size: 11px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 12px; opacity: 0.8; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--line-color); 
            padding: 24px 10px; border-radius: 20px; text-align: center; 
            font-weight: 800; font-size: 15px; transition: var(--transition); 
            backdrop-filter: blur(10px);
        }
        .card.selected { border-color: var(--accent-color); background: rgba(255, 140, 0, 0.12); box-shadow: 0 8px 24px rgba(255, 140, 0, 0.15); transform: translateY(-4px); }

        input { 
            width: 100%; background: var(--card-bg); border: 1px solid var(--line-color); 
            padding: 18px; border-radius: 16px; color: #fff; font-size: 16px; 
            box-sizing: border-box; outline: none; transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        input:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.1); }

        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .tag { background: var(--line-color); padding: 10px 16px; border-radius: 25px; font-size: 13px; font-weight: 600; cursor: pointer; }

        .btn-row { margin-top: auto; display: flex; gap: 15px; padding: 30px 0; }
        .nav-btn { 
            flex: 1; padding: 22px; border-radius: 20px; border: none; 
            font-size: 16px; font-weight: 800; text-transform: uppercase; 
            transition: var(--transition);
        }
        .primary { background: var(--accent-color); color: #000; }
        .primary:disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .secondary { background: var(--line-color); color: #fff; }

        #success-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #success-text { font-family: 'JetBrains Mono', monospace; color: var(--accent-color); text-align: center; font-size: 18px; margin-top: 25px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="container" id="main-ui">
        <div class="header">
            <div class="typewriter-section">
                <h1>AetheStore <span id="text-node"></span><span class="cursor"></span></h1>
            </div>
            <div class="lang-switcher">
                <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
                <button id="lang-pl" class="lang-btn" onclick="setLanguage('pl')">PL</button>
                <button id="lang-ru" class="lang-btn" onclick="setLanguage('ru')">RU</button>
            </div>
        </div>

        <div class="progress-container"><div class="progress-fill" id="p-fill"></div></div>

        <div class="step active" id="step1">
            <label id="lbl-brand">Brand</label>
            <div class="grid">
                <div class="card selected" onclick="selectBrand('iPhone', this)"> iPhone</div>
                <div class="card" onclick="selectBrand('Samsung', this)">SAMSUNG</div>
                <div class="card" onclick="selectBrand('Xiaomi', this)">Xiaomi</div>
                <div class="card" onclick="selectBrand('Other', this)">Other</div>
            </div>
        </div>

        <div class="step" id="step2">
            <label id="lbl-model">Model</label>
            <input type="text" id="inp-model" placeholder="e.g. 15 Pro" oninput="validate()">
            <label id="lbl-issue">Issue (min 10 chars)</label>
            <input type="text" id="inp-issue" placeholder="Describe problem" oninput="validate()">
            <div class="tags">
                <div class="tag" onclick="setIssue('Screen 📱')">Screen 📱</div>
                <div class="tag" onclick="setIssue('Battery 🔋')">Battery 🔋</div>
                <div class="tag" onclick="setIssue('Water 💧')">Water 💧</div>
            </div>
        </div>

        <div class="step" id="step3">
            <label id="lbl-phone">Phone</label>
            <input type="tel" id="inp-phone" placeholder="+48 ___ ___ ___" oninput="validate()">
            <label id="lbl-loc">Address</label>
            <input type="text" id="inp-loc" placeholder="City, Street" oninput="validate()">
        </div>

        <div class="btn-row">
            <button class="nav-btn secondary" id="btn-back" onclick="prevStep()" style="display: none;">Back</button>
            <button class="nav-btn primary" id="btn-next" onclick="nextStep()" disabled>Next</button>
        </div>
    </div>

    <div id="success-screen">
        <div id="lottie-check" style="width: 200px; height: 200px;"></div>
        <div id="success-text"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentStep = 1;
        let orderData = { brand: 'iPhone', device: '', phone: '', location: '', problem: '' };

        const translations = {
            en: { model: "Model", issue: "Issue (min 10 chars)", phone: "Phone", loc: "Address", next: "Next", back: "Back", confirm: "Confirm", success: "BOOKING CONFIRMED" },
            pl: { model: "Model", issue: "Opis (min 10 znaków)", phone: "Telefon", loc: "Adres", next: "Dalej", back: "Wstecz", confirm: "Zatwierdź", success: "ZAMÓWIENIE PRZYJĘTE" },
            ru: { model: "Модель", issue: "Описание (мин 10 симв.)", phone: "Телефон", loc: "Адрес", next: "Далее", back: "Назад", confirm: "Подтвердить", success: "ЗАПИСЬ ПОДТВЕРЖДЕНА" }
        };

        // ИСПРАВЛЕННАЯ АНИМАЦИЯ: Стирает полностью до конца
        function runTypewriter() {
            const words = ["Premium", "Service"];
            const node = document.getElementById('text-node');
            let wordIdx = 0, charIdx = 0, isDel = false;

            function type() {
                const word = words[wordIdx];
                node.innerText = word.substring(0, charIdx);

                if (isDel) {
                    charIdx--;
                } else {
                    charIdx++;
                }

                let speed = isDel ? 60 : 140;

                // Пауза на полностью напечатанном слове
                if (!isDel && charIdx > word.length) {
                    isDel = true;
                    speed = 2500; 
                } 
                // Когда слово стерто полностью (до 0 символов)
                else if (isDel && charIdx < 0) {
                    isDel = false;
                    charIdx = 0;
                    wordIdx = (wordIdx + 1) % words.length;
                    speed = 500;
                }

                setTimeout(type, speed);
            }
            type();
        }

        function setLanguage(lang) {
            localStorage.setItem('aethe_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            const t = translations[lang];
            document.getElementById('lbl-model').innerText = t.model;
            document.getElementById('lbl-issue').innerText = t.issue;
            document.getElementById('lbl-phone').innerText = t.phone;
            document.getElementById('lbl-loc').innerText = t.loc;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('success-text').innerHTML = t.success;
            updateUI();
        }

        const phoneInput = document.getElementById('inp-phone');
        phoneInput.addEventListener('focus', () => { if(!phoneInput.value) phoneInput.value = '+48 '; });

        function validate() {
            const nextBtn = document.getElementById('btn-next');
            let valid = false;

            if (currentStep === 1) valid = true;
            else if (currentStep === 2) {
                valid = document.getElementById('inp-model').value.length >= 3 && 
                        document.getElementById('inp-issue').value.length >= 10;
            }
            else if (currentStep === 3) {
                const p = phoneInput.value.replace(/\D/g, '');
                valid = p.length >= 11 && document.getElementById('inp-loc').value.length >= 3;
            }
            nextBtn.disabled = !valid;
        }

        function selectBrand(name, el) {
            orderData.brand = name;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            tg.HapticFeedback.impactOccurred('medium');
            validate();
        }

        function setIssue(text) {
            document.getElementById('inp-issue').value = text;
            tg.HapticFeedback.selectionChanged();
            validate();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + currentStep).classList.add('active');
            document.getElementById('p-fill').style.width = (currentStep * 33.3) + '%';
            document.getElementById('btn-back').style.display = currentStep === 1 ? 'none' : 'block';
            const lang = localStorage.getItem('aethe_lang') || 'ru';
            document.getElementById('btn-next').innerText = currentStep === 3 ? translations[lang].confirm : translations[lang].next;
            validate();
        }

        function nextStep() {
            if (currentStep < 3) {
                currentStep++; updateUI();
                tg.HapticFeedback.impactOccurred('rigid');
            } else sendData();
        }

        function prevStep() {
            if (currentStep > 1) { currentStep--; updateUI(); }
        }

        function sendData() {
            orderData.device = document.getElementById('inp-model').value;
            orderData.problem = document.getElementById('inp-issue').value;
            orderData.phone = phoneInput.value;
            orderData.location = document.getElementById('inp-loc').value;
            tg.sendData(JSON.stringify(orderData));
            showSuccess();
        }

        function showSuccess() {
            document.getElementById('main-ui').style.display = 'none';
            const screen = document.getElementById('success-screen');
            screen.style.display = 'flex';
            lottie.loadAnimation({
                container: document.getElementById('lottie-check'),
                path: 'https://lottie.host/9c24095b-3b49-4786-8a7e-128c743e4987/j6IuE9G4W9.json',
                renderer: 'svg', loop: false, autoplay: true
            });
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(() => tg.close(), 3500);
        }

        window.onload = () => {
            runTypewriter();
            setLanguage(localStorage.getItem('aethe_lang') || 'ru');
        };
    </script>
</body>
</html>
