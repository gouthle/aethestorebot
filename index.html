<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethe Premium Service</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* --- ПЕРЕМЕННЫЕ ЦВЕТОВ (Titanium Orange Style) --- */
        :root {
            --accent-color: #FF8C00; 
            --bg-color: #000000;
            --main-text: #ffffff;
            --hint-text: rgba(255, 255, 255, 0.5);
            --line-color: rgba(255, 255, 255, 0.15);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ОБЩИЕ СТИЛИ --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px 25px 50px 25px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА --- */
        .language-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 8px;
        }

        .lang-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--line-color);
            color: var(--main-text);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-button.active {
            background: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
        }

        /* --- ЗАГОЛОВОК С ЦИКЛИЧНОЙ ПЕЧАТЬЮ --- */
        .header-section {
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 44px;
            font-weight: 900;
            margin: 0;
            color: var(--accent-color);
            letter-spacing: -1.5px;
            text-transform: uppercase;
            min-height: 54px;
            display: flex;
            align-items: center;
        }

        /* Мигающая палочка (курсор) */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 38px;
            background-color: var(--accent-color);
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .header-section p {
            font-size: 13px;
            margin: 5px 0 0 0;
            color: var(--hint-text);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- ПОЛЯ ВВОДА --- */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--line-color);
            border-radius: 0;
            padding: 12px 0;
            color: #ffffff;
            font-size: 17px;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-bottom-color: var(--accent-color);
        }

        /* Контейнер для локации с кнопкой */
        .location-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .geo-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--line-color);
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .geo-btn:active {
            background: var(--accent-color);
            transform: scale(0.9);
        }

        /* --- КНОПКА ОТПРАВКИ --- */
        .submit-btn {
            margin-top: 20px;
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 18px;
            padding: 20px;
            font-size: 17px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Эффект затухания текста при смене языка */
        .fade-text {
            transition: opacity 0.3s ease;
        }
        .hidden { opacity: 0; }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="language-container">
            <button id="lang-en" class="lang-button" onclick="setLanguage('en')">EN</button>
            <button id="lang-pl" class="lang-button" onclick="setLanguage('pl')">PL</button>
            <button id="lang-ru" class="lang-button" onclick="setLanguage('ru')">RU</button>
        </div>

        <div class="header-section">
            <h1 id="typewriter-title"><span id="text-node"></span><span class="cursor"></span></h1>
            <p id="app-subtitle" class="fade-text">Premium Service</p>
        </div>

        <div class="input-group">
            <label id="lbl-brand" class="fade-text">Device Brand</label>
            <select id="inp-brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="input-group">
            <label id="lbl-model" class="fade-text">Model & Memory</label>
            <input type="text" id="inp-model" placeholder="e.g. 16 Pro, 256GB">
        </div>

        <div class="input-group">
            <label id="lbl-phone" class="fade-text">Phone Number</label>
            <input type="tel" id="inp-phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="input-group">
            <label id="lbl-geo" class="fade-text">Location / Address</label>
            <div class="location-row">
                <input type="text" id="inp-location" placeholder="Enter address or tap pin">
                <button class="geo-btn" onclick="getLocation()">📍</button>
            </div>
        </div>

        <div class="input-group">
            <label id="lbl-issue" class="fade-text">Problem Description</label>
            <input type="text" id="inp-issue" placeholder="What needs to be fixed?">
        </div>

        <button class="submit-btn fade-text" id="btn-submit" onclick="sendDataToBot()">
            Confirm Booking
        </button>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        const translations = {
            en: {
                subtitle: "Premium Service", brand: "Device Brand", model: "Model & Memory",
                model_ph: "e.g. 16 Pro, 256GB", phone: "Phone Number", geo: "Location / Address",
                geo_ph: "Enter address or tap pin", issue: "Problem Description",
                issue_ph: "What needs to be fixed?", submit: "Confirm Booking"
            },
            pl: {
                subtitle: "Serwis Premium", brand: "Marka urządzenia", model: "Model i Pamięć",
                model_ph: "np. 16 Pro, 256GB", phone: "Numer telefonu", geo: "Lokalizacja / Adres",
                geo_ph: "Wpisz adres lub kliknij pinezkę", issue: "Opis problemu",
                issue_ph: "Co należy naprawić?", submit: "Złóż zamówienie"
            },
            ru: {
                subtitle: "Премиальный сервис", brand: "Бренд устройства", model: "Модель и Память",
                model_ph: "напр. 16 Pro, 256ГБ", phone: "Номер телефона", geo: "Локация / Адрес",
                geo_ph: "Введите адрес или нажмите на пин", issue: "Описание проблемы",
                issue_ph: "Что нужно починить?", submit: "Подтвердить запись"
            }
        };

        // Анимация печатающегося текста (AETHE <-> SERVICE)
        function runTypewriter() {
            const words = ["AETHE", "SERVICE"];
            const container = document.getElementById('text-node');
            let wordIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            let typeSpeed = 250; // Медленная печать

            function type() {
                const currentWord = words[wordIndex];
                
                if (isDeleting) {
                    container.innerHTML = currentWord.substring(0, charIndex - 1);
                    charIndex--;
                    typeSpeed = 100; // Стирание быстрее
                } else {
                    container.innerHTML = currentWord.substring(0, charIndex + 1);
                    charIndex++;
                    typeSpeed = 250; // Печать медленнее
                }

                if (!isDeleting && charIndex === currentWord.length) {
                    isDeleting = true;
                    typeSpeed = 2000; // Пауза на дочитаться
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    typeSpeed = 500;
                }

                setTimeout(type, typeSpeed);
            }
            type();
        }

        // Смена языка
        function setLanguage(lang) {
            localStorage.setItem('aethe_lang', lang);
            
            document.querySelectorAll('.lang-button').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');

            const targets = document.querySelectorAll('.fade-text');
            targets.forEach(t => t.classList.add('hidden'));

            setTimeout(() => {
                const t = translations[lang];
                document.getElementById('app-subtitle').innerText = t.subtitle;
                document.getElementById('lbl-brand').innerText = t.brand;
                document.getElementById('lbl-model').innerText = t.model;
                document.getElementById('inp-model').placeholder = t.model_ph;
                document.getElementById('lbl-phone').innerText = t.phone;
                document.getElementById('lbl-geo').innerText = t.geo;
                document.getElementById('inp-location').placeholder = t.geo_ph;
                document.getElementById('lbl-issue').innerText = t.issue;
                document.getElementById('inp-issue').placeholder = t.issue_ph;
                document.getElementById('btn-submit').innerText = t.submit;
                
                targets.forEach(t => t.classList.remove('hidden'));
            }, 300);
        }

        // Геолокация
        function getLocation() {
            if (navigator.geolocation) {
                tg.HapticFeedback.impactOccurred('medium');
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude.toFixed(5);
                    const lon = pos.coords.longitude.toFixed(5);
                    document.getElementById('inp-location').value = `📍 ${lat}, ${lon}`;
                }, () => {
                    tg.showAlert("Location access denied.");
                });
            }
        }

        // Отправка данных
        function sendDataToBot() {
            const data = {
                brand: document.getElementById('inp-brand').value,
                device: document.getElementById('inp-model').value,
                phone: document.getElementById('inp-phone').value,
                location: document.getElementById('inp-location').value,
                problem: document.getElementById('inp-issue').value
            };

            if (!data.device || !data.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Please fill in the required fields!");
                return;
            }

            tg.HapticFeedback.impactOccurred('heavy');
            tg.sendData(JSON.stringify(data));
        }

        // Инициализация
        window.addEventListener('DOMContentLoaded', () => {
            runTypewriter();
            const savedLang = localStorage.getItem('aethe_lang') || 'en';
            setLanguage(savedLang);
        });

    </script>
</body>
</html>
