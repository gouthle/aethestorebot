<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethe Premium Service</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* 1. ПЕРЕМЕННЫЕ И ОСНОВНЫЕ СТИЛИ 
        */
        :root {
            --accent-color: #FF8C00; /* Titanium Orange */
            --bg-dark: #000000;
            --field-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --transition-speed: 0.4s;
            --curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 2. АНИМАЦИИ 
        */
        @keyframes containerEntrance {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px 25px 50px 25px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            animation: containerEntrance 0.8s var(--curve) forwards;
        }

        /* 3. ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА 
        */
        .language-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 35px;
            gap: 10px;
        }

        .lang-node {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-speed) var(--curve);
            text-transform: uppercase;
        }

        .lang-node.active {
            background: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
        }

        /* 4. ШАПКА 
        */
        .brand-section {
            margin-bottom: 45px;
        }

        .brand-section h1 {
            font-size: 42px;
            font-weight: 900;
            margin: 0;
            color: var(--accent-color);
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .brand-section p {
            font-size: 13px;
            font-weight: 500;
            margin: 10px 0 0 0;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 5. ФОРМА И ПОЛЯ 
        */
        .input-wrapper {
            margin-bottom: 35px;
            position: relative;
        }

        .input-wrapper label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            transition: var(--transition-speed);
        }

        input, select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            border-radius: 0;
            padding: 12px 0;
            color: #ffffff;
            font-size: 18px;
            outline: none;
            transition: var(--transition-speed) var(--curve);
            box-sizing: border-box;
        }

        input:focus {
            border-bottom-color: var(--accent-color);
            padding-left: 8px;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        /* Стилизация локации */
        .geo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .geo-btn {
            background: var(--field-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .geo-btn:active {
            border-color: var(--accent-color);
            background: rgba(255, 140, 0, 0.1);
        }

        /* 6. КНОПКА ОТПРАВКИ 
        */
        .submit-trigger {
            margin-top: auto;
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 22px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .submit-trigger:active {
            transform: scale(0.96);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.1);
        }

        /* Эффекты затухания текста */
        .text-anim {
            transition: opacity 0.3s ease;
        }
        
        .is-hidden {
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="container" id="main-app">
        
        <header class="language-header">
            <button id="ru-selector" class="lang-node" onclick="updateLanguage('ru', this)">RU</button>
            <button id="en-selector" class="lang-node" onclick="updateLanguage('en', this)">EN</button>
            <button id="pl-selector" class="lang-node" onclick="updateLanguage('pl', this)">PL</button>
        </header>

        <section class="brand-section">
            <h1>Aethe</h1>
            <p id="ui-subtitle" class="text-anim">Premium Device Service</p>
        </section>

        <div class="input-wrapper">
            <label id="ui-label-brand" class="text-anim">Device</label>
            <select id="field-brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label id="ui-label-model" class="text-anim">Model</label>
            <input type="text" id="field-model" placeholder="...">
        </div>

        <div class="input-wrapper">
            <label id="ui-label-phone" class="text-anim">Phone Number</label>
            <input type="tel" id="field-phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="input-wrapper">
            <label id="ui-label-geo" class="text-anim">Your Location</label>
            <div class="geo-container">
                <input type="text" id="field-location" placeholder="...">
                <button class="geo-btn" onclick="fetchLocation()">
                    <span style="font-size: 20px;">📍</span>
                </button>
            </div>
        </div>

        <div class="input-wrapper">
            <label id="ui-label-issue" class="text-anim">Describe Problem</label>
            <input type="text" id="field-problem" placeholder="...">
        </div>

        <button class="submit-trigger text-anim" id="ui-button-text" onclick="submitApplication()">
            Confirm Order
        </button>

    </div>

    <script>
        // Инициализация Telegram WebApp
        const webapp = window.Telegram.WebApp;
        webapp.expand();
        webapp.setHeaderColor('#000000');
        webapp.setBackgroundColor('#000000');

        // Словарь переводов
        const langData = {
            ru: {
                subtitle: "Премиальный сервис",
                brand: "Тип устройства",
                model: "Модель и память",
                model_ph: "Напр: 17 Pro, 256GB",
                phone: "Ваш телефон",
                geo: "Адрес / Локация",
                issue: "Что сломалось?",
                issue_ph: "Напр: замена экрана",
                submit: "Оформить заявку"
            },
            en: {
                subtitle: "Premium Device Service",
                brand: "Device Type",
                model: "Model & Memory",
                model_ph: "e.g. 17 Pro, 256GB",
                phone: "Phone Number",
                geo: "Address / Location",
                issue: "Describe Problem",
                issue_ph: "e.g. Screen replacement",
                submit: "Confirm Order"
            },
            pl: {
                subtitle: "Serwis Urządzeń Premium",
                brand: "Typ urządzenia",
                model: "Model и Pamięć",
                model_ph: "np. 17 Pro, 256GB",
                phone: "Numer telefonu",
                geo: "Adres / Lokalizacja",
                issue: "Co jest zepsute?",
                issue_ph: "np. wymiana ekranu",
                submit: "Złóż zamówienie"
            }
        };

        // Смена языка
        function updateLanguage(lang, btnElement) {
            localStorage.setItem('pref_lang', lang);

            const animElements = document.querySelectorAll('.text-anim');
            animElements.forEach(el => el.classList.add('is-hidden'));

            setTimeout(() => {
                // Подсветка кнопок
                document.querySelectorAll('.lang-node').forEach(b => b.classList.remove('active'));
                if (btnElement) {
                    btnElement.classList.add('active');
                } else {
                    document.getElementById(lang + '-selector').classList.add('active');
                }

                // Обновление контента
                const t = langData[lang];
                document.getElementById('ui-subtitle').innerText = t.subtitle;
                document.getElementById('ui-label-brand').innerText = t.brand;
                document.getElementById('ui-label-model').innerText = t.model;
                document.getElementById('field-model').placeholder = t.model_ph;
                document.getElementById('ui-label-phone').innerText = t.phone;
                document.getElementById('ui-label-geo').innerText = t.geo;
                document.getElementById('ui-label-issue').innerText = t.issue;
                document.getElementById('field-problem').placeholder = t.issue_ph;
                document.getElementById('ui-button-text').innerText = t.submit;

                animElements.forEach(el => el.classList.remove('is-hidden'));
            }, 300);
        }

        // Получение геолокации
        function fetchLocation() {
            if (navigator.geolocation) {
                webapp.HapticFeedback.impactOccurred('light');
                navigator.geolocation.getCurrentPosition((pos) => {
                    const coords = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                    document.getElementById('field-location').value = "📍 " + coords;
                }, (err) => {
                    webapp.showAlert("Доступ к геопозиции отклонен");
                });
            }
        }

        // Отправка данных
        function submitApplication() {
            const payload = {
                brand: document.getElementById('field-brand').value,
                device: document.getElementById('field-model').value,
                phone: document.getElementById('field-phone').value,
                location: document.getElementById('field-location').value,
                problem: document.getElementById('field-problem').value
            };

            if (!payload.device || !payload.phone) {
                webapp.HapticFeedback.notificationOccurred('error');
                webapp.showAlert("Пожалуйста, заполните модель и телефон!");
                return;
            }

            webapp.HapticFeedback.impactOccurred('heavy');
            webapp.sendData(JSON.stringify(payload));
        }

        // Авто-выбор при старте
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('pref_lang');
            const tgLang = webapp.initDataUnsafe.user?.language_code;
            
            if (saved && langData[saved]) {
                updateLanguage(saved);
            } else if (tgLang && langData[tgLang]) {
                updateLanguage(tgLang);
            } else {
                updateLanguage('ru');
            }
        });

    </script>
</body>
</html>
