<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #FF8C00;
            --bg: #000000;
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px 25px 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out; /* Анимация появления всего экрана */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Переключатель языка */
        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 30px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: scale(1.05);
        }

        /* Заголовок с анимацией текста */
        .header { margin-bottom: 40px; }
        .header h1 { 
            font-size: 42px; 
            font-weight: 900; 
            margin: 0; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: -2px;
        }
        .header p { 
            font-size: 12px; 
            opacity: 0.5; 
            margin: 8px 0 0 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: var(--transition);
        }

        /* Поля формы */
        .form-group { 
            margin-bottom: 32px; 
            transition: var(--transition);
        }

        label { 
            display: block; 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            margin-bottom: 10px;
        }
        
        input, select {
            width: 100%; 
            background: transparent; 
            border: none; 
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 0; 
            padding: 12px 0; 
            color: #fff; 
            font-size: 18px; 
            outline: none; 
            transition: var(--transition);
        }

        input:focus, select:focus { 
            border-bottom-color: var(--accent);
            padding-left: 5px; /* Легкий сдвиг при фокусе */
        }

        /* Плавная смена текста */
        .fade-text {
            transition: opacity 0.3s ease;
        }
        .fade-out { opacity: 0; }

        .btn {
            margin-top: auto; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 20px;
            padding: 22px; 
            font-size: 17px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:active { 
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.1);
        }

        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <button id="btn-ru" class="lang-btn" onclick="setLanguage('ru', this)">RU</button>
            <button id="btn-en" class="lang-btn" onclick="setLanguage('en', this)">EN</button>
            <button id="btn-pl" class="lang-btn" onclick="setLanguage('pl', this)">PL</button>
        </div>

        <div class="header">
            <h1>Aethe</h1>
            <p id="subtitle" class="fade-text">Premium Service</p>
        </div>

        <div class="form-group">
            <label id="label-brand" class="fade-text">Device</label>
            <select id="brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label id="label-model" class="fade-text">Model</label>
            <input type="text" id="device" placeholder="...">
        </div>

        <div class="form-group">
            <label id="label-phone" class="fade-text">Contact Phone</label>
            <input type="tel" id="phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="form-group">
            <label id="label-issue" class="fade-text">Issue</label>
            <input type="text" id="problem" placeholder="...">
        </div>

        <button class="btn fade-text" id="submit-btn" onclick="sendData()">Confirm Repair</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        const translations = {
            ru: {
                subtitle: "Премиальный сервис",
                brand: "Устройство",
                model: "Модель",
                model_ph: "Напр: 17 Pro, 1ТБ",
                phone: "Контактный телефон",
                issue: "Что случилось?",
                issue_ph: "Опишите проблему",
                submit: "Подтвердить запись"
            },
            en: {
                subtitle: "Premium Service",
                brand: "Device",
                model: "Model",
                model_ph: "e.g. 17 Pro, 1TB",
                phone: "Contact Phone",
                issue: "What happened?",
                issue_ph: "Describe the issue",
                submit: "Confirm Booking"
            },
            pl: {
                subtitle: "Serwis Premium",
                brand: "Urządzenie",
                model: "Model",
                model_ph: "np. 17 Pro, 1TB",
                phone: "Numer telefonu",
                issue: "Co się stało?",
                issue_ph: "Opisz problem",
                submit: "Potwierdź naprawę"
            }
        };

        function setLanguage(lang, btn) {
            // Сохраняем
            localStorage.setItem('aethe_lang', lang);
            
            // Анимация затухания текста перед сменой
            const elements = document.querySelectorAll('.fade-text');
            elements.forEach(el => el.classList.add('fade-out'));

            setTimeout(() => {
                // Меняем кнопки
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                if(btn) btn.classList.add('active');
                else document.getElementById('btn-' + lang).classList.add('active');

                // Меняем тексты
                const t = translations[lang];
                document.getElementById('subtitle').innerText = t.subtitle;
                document.getElementById('label-brand').innerText = t.brand;
                document.getElementById('label-model').innerText = t.model;
                document.getElementById('device').placeholder = t.model_ph;
                document.getElementById('label-phone').innerText = t.phone;
                document.getElementById('label-issue').innerText = t.issue;
                document.getElementById('problem').placeholder = t.issue_ph;
                document.getElementById('submit-btn').innerText = t.submit;

                // Возвращаем видимость
                elements.forEach(el => el.classList.remove('fade-out'));
            }, 300);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('aethe_lang');
            const tgLang = tg.initDataUnsafe.user?.language_code;

            if (savedLang && translations[savedLang]) {
                setLanguage(savedLang);
            } else if (tgLang && translations[tgLang]) {
                setLanguage(tgLang);
            } else {
                setLanguage('ru');
            }
        });

        function sendData() {
            const data = {
                brand: document.getElementById('brand').value,
                device: document.getElementById('device').value,
                phone: document.getElementById('phone').value,
                problem: document.getElementById('problem').value
            };
            
            if (!data.device || !data.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Fill in the fields!");
                return;
            }

            tg.HapticFeedback.impactOccurred('heavy');
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
