<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: var(--tg-theme-text-color, #ffffff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #0e1621);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* Тот самый эффект размытия */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 22px;
            text-align: center;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 16px; /* 16px предотвращает авто-зум в iOS */
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--tg-theme-button-color, #3390ec);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s ease;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Aethe Service</h2>
        
        <div class="input-group">
            <label>Бренд</label>
            <select id="brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Другое">Другое</option>
            </select>
        </div>

        <div class="input-group">
            <label>Модель</label>
            <input type="text" id="device" placeholder="Напр: 13 Pro 128gb">
        </div>

        <div class="input-group">
            <label>Телефон</label>
            <input type="tel" id="phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="input-group">
            <label>Проблема</label>
            <input type="text" id="problem" placeholder="Что нужно сделать?">
        </div>

        <button onclick="sendData()">Отправить заявку</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            let data = {
                brand: document.getElementById('brand').value,
                device: document.getElementById('device').value,
                phone: document.getElementById('phone').value,
                problem: document.getElementById('problem').value
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
